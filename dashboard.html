<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin Dashboard - Ghost Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { display: flex; height: 100vh; background: #020617; color: white; overflow: hidden; }
        
        /* Left Pane - Live Banking App */
        .left-pane {
            flex: 1;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #334155;
        }
        .mock-phone {
            width: 430px;
            height: 90vh;
            border-radius: 40px;
            border: 12px solid #000;
            overflow: hidden;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Right Pane - Digital Twin Dashboard */
        .right-pane {
            width: 500px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #020617;
            overflow-y: auto;
        }

        h2 { font-size: 18px; font-weight: 700; color: #94a3b8; letter-spacing: 1.5px; margin-bottom: 4px; }

        .card {
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1e293b;
            transition: all 0.3s ease;
        }

        .label { font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
        .value { font-size: 18px; font-weight: 700; color: #f8fafc; }
        .value.large { font-size: 36px; font-family: monospace; color: #4ade80; }

        /* Live Log / Terminal Style */
        .log-container {
            background: #000;
            border-radius: 8px;
            padding: 12px;
            height: 180px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            border: 1px solid #1e293b;
            display: flex;
            flex-direction: column-reverse;
            gap: 4px;
        }
        .log-entry { border-left: 2px solid #334155; padding-left: 8px; }
        .log-time { color: #64748b; }
        .log-action { color: #4ade80; }
        .log-anomaly { color: #f87171; font-weight: bold; }

        /* Blockchain Visuals */
        #blockchain-feed {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
        }
        .block {
            background: rgba(251, 191, 36, 0.05);
            border: 1px solid #fbbf24;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 11px;
            animation: slideIn 0.4s ease;
        }

        /* Status & Progress */
        .status-badge { padding: 10px; border-radius: 8px; font-weight: 800; text-align: center; margin-top: 10px; font-size: 14px; }
        .normal { background: #064e3b; color: #4ade80; }
        .danger { background: #7f1d1d; color: #f87171; }
        
        .progress-track { width: 100%; height: 12px; background: #1e293b; border-radius: 6px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.4s ease; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .pulse { animation: flexPulse 2s infinite; }
        @keyframes flexPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div class="left-pane">
        <div class="mock-phone">
            <iframe src="yono.html" title="Banking App"></iframe>
        </div>
    </div>

    <div class="right-pane">
        <h2 style="display:flex; justify-content:space-between;">
            TWIN MONITOR <span class="pulse" style="color:#4ade80; font-size:11px;">● LIVE HUB</span>
        </h2>
        
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span class="label">Virtual Identity</span>
                    <span class="value" id="ui-user">Initializing...</span>
                </div>
                <div style="text-align:right;">
                    <span class="label">Detection Mode</span>
                    <span id="ui-mode" style="font-size:12px; font-weight:bold; color:#4ade80;">--</span>
                </div>
            </div>
        </div>

        <div class="card">
            <span class="label">Behavioral Integrity Score</span>
            <span class="value large" id="ui-score">0%</span>
            <div class="progress-track">
                <div id="ui-bar" class="progress-fill" style="width: 0%; background: #4ade80;"></div>
            </div>
            <div id="ui-status" class="status-badge normal">SECURE CONNECTION</div>
        </div>

        <div class="card">
            <span class="label">Ghost User - Live Activity</span>
            <div class="log-container" id="ui-log">
                <div class="log-entry"><span class="log-action">Awaiting first movement...</span></div>
            </div>
        </div>

        <div class="card" id="bc-card" style="display:none; border: 1px solid #fbbf24;">
            <span class="label" style="color:#fbbf24;">⛓️ Blockchain Forensic Ledger</span>
            <div id="blockchain-feed"></div>
        </div>
    </div>

    <script>
        let lastActionTs = null;
        let lastIpfsHash = null;

        async function fetchStatus() {
            try {
                const response = await fetch('/api/twin-status');
                const data = await response.json();
                updateUI(data);
            } catch (err) {
                console.log("Waiting for server...");
            }
        }

        function updateUI(data) {
            // Update Identity & Score
            document.getElementById('ui-user').textContent = data.userId;
            document.getElementById('ui-mode').textContent = data.mode ? data.mode.toUpperCase() : "UNKNOWN";
            document.getElementById('ui-score').textContent = data.riskScore + "%";
            document.getElementById('ui-bar').style.width = data.riskScore + "%";

            const status = document.getElementById('ui-status');
            const bar = document.getElementById('ui-bar');

            if (data.riskScore > 70 || data.mode === 'honeypot') {
                status.textContent = "🚨 BREACH DETECTED";
                status.className = "status-badge danger";
                bar.style.background = "#f87171";
                // Reveal Blockchain Card
                document.getElementById('bc-card').style.display = 'block';
            } else {
                status.textContent = "✅ SECURE CONNECTION";
                status.className = "status-badge normal";
                bar.style.background = "#4ade80";
            }

            // Real Blockchain Visualization
            if (data.blockchain && data.blockchain.ipfsHash !== lastIpfsHash) {
                addRealBlockchainBlock(data.blockchain.ipfsHash, data.blockchain.txHash);
                lastIpfsHash = data.blockchain.ipfsHash;
            }

            // Update Ghost Log
            if (data.action && data.timestamp !== lastActionTs) {
                const logContainer = document.getElementById('ui-log');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                
                let anomalyMarker = data.anomaly ? `<span class="log-anomaly"> [ALERT: ${data.reasons[0]}]</span>` : "";
                
                entry.innerHTML = `
                    <span class="log-time">[${data.timestamp}]</span> 
                    <span class="log-action">> ${data.action.replace(/_/g, ' ')}</span>
                    ${anomalyMarker}
                `;
                logContainer.prepend(entry);

                lastActionTs = data.timestamp;
            }
        }

        function addRealBlockchainBlock(ipfs, tx) {
            const feed = document.getElementById('blockchain-feed');
            const block = document.createElement('div');
            block.className = 'block';
            block.innerHTML = `
                <div style="color:#fbbf24; font-weight:bold; margin-bottom:4px;">✅ FORENSICS ANCHORED</div>
                <div style="color:#94a3b8;">IPFS CID: <a href="https://gateway.pinata.cloud/ipfs/${ipfs}" target="_blank" style="color:#4ade80; text-decoration:none;">${ipfs.substring(0, 16)}...</a></div>
                <div style="color:#f8fafc; word-break:break-all; font-size:10px; margin-top:2px;">TX: <a href="https://sepolia.etherscan.io/tx/${tx}" target="_blank" style="color:#38bdf8; text-decoration:none;">${tx}</a></div>
            `;
            if (feed.children.length < 10) feed.prepend(block);
        }

        // 1-second dynamic polling
        setInterval(fetchStatus, 1000);
        fetchStatus();
    </script>
</body>
</html>
